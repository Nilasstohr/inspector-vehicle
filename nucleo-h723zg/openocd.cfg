# OpenOCD configuration for Nucleo-H723ZG (STLINK-V3 on-board)
# Used by CLion's built-in OpenOCD integration and the CMake 'flash' target.

source [find interface/stlink.cfg]
transport select hla_swd

source [find target/stm32h7x.cfg]

# Speed — 4 MHz is reliable with STLINK-V3; raise to 8000 if transfers feel slow
adapter speed 4000

reset_config srst_only

