name: Release
run-name: ${{ github.actor }} is releasing 🚀
on:
  # Only triggered manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  # Run the full precommit workflow first (build + tests must pass before release)
  precommit:
    uses: ./.github/workflows/precommit.yaml
    # Pass all repository secrets (e.g. CR_PAT) into the reusable precommit workflow
    secrets: inherit

  release:
    # Only run this job if precommit passed
    needs: precommit
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts from precommit
        # Artifacts uploaded by the precommit job are available in this same workflow run
        uses: actions/download-artifact@v4
        with:
          name: ros2-build-artifacts
          path: artifacts/

      - name: Restore executable permissions on binaries
        # actions/download-artifact strips the executable bit from binaries.
        # All compiled ROS2 node executables live under lib/<package>/ and must
        # be executable otherwise ros2 launch reports "executable not found".
        run: find artifacts/ros2_ws/install -path "*/lib/*/*" -type f -exec chmod +x {} \;

      - name: Set lowercase owner name
        run: echo "OWNER=$(echo ${{ github.actor }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull ROS2 Humble base image from registry
        run: |
          docker pull ghcr.io/${{ env.OWNER }}/ros2-humble-image:latest
          docker tag ghcr.io/${{ env.OWNER }}/ros2-humble-image:latest ros2-humble-image

      - name: Build release Docker image
        run: docker build -t inspector-vehicle-image -f artifacts/Docker/Dockerfile artifacts/

      - name: Verify sllidar_node in built image
        run: docker run --rm inspector-vehicle-image ls -la /app/install/sllidar_ros2/lib/sllidar_ros2/

      - name: Tag Docker image for GitHub Container Registry
        run: docker tag inspector-vehicle-image ghcr.io/${{ env.OWNER }}/inspector-vehicle-image:latest

      - name: Push release Docker image to registry
        run: docker push ghcr.io/${{ env.OWNER }}/inspector-vehicle-image:latest

      - run: echo "✅ Released ghcr.io/${{ env.OWNER }}/inspector-vehicle-image:latest"

  deploy:
    # Only run if release (build + push) succeeded
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        # Joins the GitHub Actions runner to the Tailscale network so it can
        # reach the robot on its private 100.x.x.x address
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to robot1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ROBOT1_HOST }}
          username: ${{ secrets.ROBOT1_USER }}
          key: ${{ secrets.ROBOT1_SSH_KEY }}
          script: |
            OWNER=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')

            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/$OWNER/inspector-vehicle-image:latest

            docker stop inspector-vehicle || true
            docker rm   inspector-vehicle || true

            DEVICES=""
            for dev in /dev/ttyUSB0 /dev/ttyACM0; do
              if [ -e "$dev" ]; then
                DEVICES="$DEVICES --device=$dev"
              else
                echo "Warning: $dev not found, skipping"
              fi
            done

            docker run -d \
              --name inspector-vehicle \
              --privileged \
              --network=host \
              $DEVICES \
              ghcr.io/$OWNER/inspector-vehicle-image:latest

            echo "--- docker ps (running containers) ---"
            docker ps

            echo "--- docker logs (container output) ---"
            sleep 5
            docker logs inspector-vehicle

            echo "✅ Robot is running the latest inspector-vehicle-image"

